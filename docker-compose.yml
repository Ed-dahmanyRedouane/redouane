version: '3.9'

services:
  bookshop-api:
    image: edredouane/bookshop-api:latest
    container_name: bookshop-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ---- Database (MySQL pre-installed on host) ----
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/bookshop_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # ---- JPA / Hibernate ----
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      # ---- JWT ----
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
      # ---- Spring Boot ----
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
    # Resolve "host.docker.internal" to Docker gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"